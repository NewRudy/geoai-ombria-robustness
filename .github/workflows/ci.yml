name: repository-audit

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Audit repository contract
        run: python scripts/audit_repository.py
      - name: Install lightweight test dependencies
        run: python -m pip install numpy pillow
      - name: Run protocol unit tests
        run: python -m unittest discover -s tests -v
